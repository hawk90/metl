# Twister metadata for the metl-on-Zephyr sample.
#
# `west twister` uses this to build AND run the sample on the listed platforms,
# monitoring the console for the sentinel the app prints. The console harness
# makes the QEMU run self-terminating and turns "sentinel seen" into pass/fail,
# which is the robust way to assert execution success on an emulated target
# (no manual `west build -t run` timeout handling needed).
sample:
  name: metl hello
  description: Consume the header-only metl C++17 library as a Zephyr module.
common:
  tags: metl cpp
  # Match the single deterministic line main() prints on success.
  harness: console
  harness_config:
    type: one_line
    regex:
      - "metl on Zephyr: OK"
tests:
  sample.metl.hello:
    # qemu_cortex_m3 is runnable under QEMU; native_sim runs as a host process.
    # Both are exercised by CI. Add more boards as needed.
    platform_allow:
      - qemu_cortex_m3
      - native_sim
    integration_platforms:
      - qemu_cortex_m3
