# Application configuration for the metl Zephyr sample.

# --- C++ ---------------------------------------------------------------------
# metl is a C++17 library. Enable the C++ subsystem and select C++17.
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# metl is exception-free and RTTI-free by design; keep both OFF (Zephyr default)
# so the sample builds with the same "no exceptions / no RTTI" contract metl is
# validated under elsewhere in CI.
CONFIG_CPP_EXCEPTIONS=n
CONFIG_CPP_RTTI=n

# --- metl module -------------------------------------------------------------
# Adds metl's include/ directory to the build (see <metl-root>/zephyr/Kconfig).
CONFIG_METL=y

# --- C++ standard library ----------------------------------------------------
# metl only pulls freestanding-style standard headers here (<type_traits>,
# <utility>, <new>, <iterator>, <initializer_list>, <cstddef>). Those
# libstdc++ headers are template-only, but on Zephyr the safest, most portable
# choice is the full C++ library (which also selects a fuller C library,
# e.g. picolibc). This is the low-risk default for correct-by-construction CI.
#
# ITERATION NOTE: metl is freestanding-friendly, so the minimal libc *may*
# suffice for this sample (fixed_vector / expected / span do not include
# <functional> or allocate). If you want the smallest footprint, try dropping
# the next line (and optionally `CONFIG_MINIMAL_LIBC=y`) and rebuild; escalate
# back to full libc++ only if the standard headers fail to compile/link.
CONFIG_REQUIRES_FULL_LIBCPP=y

# Deterministic, quiet console for the sample's single sentinel line.
CONFIG_PRINTK=y
