# ClusterFuzzLite project configuration for metl.
# https://google.github.io/clusterfuzzlite/
#
# metl is a header-only C++17 library; the harnesses live in fuzz/ and are
# compiled directly against include/ by .clusterfuzzlite/build.sh. This same
# layout (Dockerfile + build.sh + this file) is OSS-Fuzz compatible, so upstream
# registration with google/oss-fuzz is a drop-in follow-up (see docs/TODO.md).
language: c++
main_repo: "https://github.com/hawk90/metl"
sanitizers:
  - address
  - undefined
fuzzing_engines:
  - libfuzzer
