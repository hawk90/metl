# Zephyr module manifest for metl.
#
# metl is a header-only C++17 library, so this module contributes no compiled
# sources to the RTOS image — it only makes metl's public `include/` directory
# visible to Zephyr applications (an "interface-only" module).
#
# Layout follows the standard Zephyr "Modules (External projects)" convention:
#   <module-root>/zephyr/module.yml   (this file)
#   <module-root>/zephyr/CMakeLists.txt
#   <module-root>/zephyr/Kconfig
#   <module-root>/include/            (metl headers, exposed to apps)
#
# Consume it by pointing Zephyr at this checkout, e.g.:
#   west build -b qemu_cortex_m3 samples/zephyr/metl_hello \
#     -- -DEXTRA_ZEPHYR_MODULES=/abs/path/to/metl
# and enabling `CONFIG_METL=y` in the application's prj.conf.
#
# See: https://docs.zephyrproject.org/latest/develop/modules.html
name: metl
build:
  # Directory (relative to the module root) containing the module's
  # CMakeLists.txt that hooks into the Zephyr build.
  cmake: zephyr
  # Kconfig fragment sourced into the Zephyr configuration tree; defines
  # `config METL`.
  kconfig: zephyr/Kconfig
