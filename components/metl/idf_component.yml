# ESP-IDF component manifest for metl (IDF Component Manager).
#
# This makes metl discoverable/consumable via the IDF Component Manager
# (`idf.py add-dependency`, the ESP Component Registry, or a local `path:`
# dependency). metl is header-only, so it contributes no compiled sources —
# the sibling CMakeLists.txt registers metl's include/ directory only.
#
# NOTE (provisional): the version below tracks metl's project version. If/when
# metl is published to https://components.espressif.com the registry
# name/namespace may differ; until then, consume it in-tree via
# EXTRA_COMPONENT_DIRS (see samples/esp-idf/metl_hello) or a local path
# dependency:
#   dependencies:
#     metl:
#       path: <abs-or-rel-path>/components/metl
#
# Manifest schema: https://docs.espressif.com/projects/idf-component-manager/en/latest/reference/manifest_file.html
version: "0.1.0"
description: >-
  Modern Embedded Template Library — header-only C++17 STL-like building blocks
  for deterministic, exception-free, no-heap embedded systems.
url: "https://github.com/hawk90/metl"
license: "Apache-2.0"

# metl requires C++17. IDF 5.x compiles C++ as C++17+ by default.
# Broad lower bound; metl does not depend on IDF-version-specific APIs (it only
# needs an include path), so keep this permissive and let CI pin the concrete
# toolchain version.
dependencies:
  idf: ">=5.0"
